  document.getElementById('cl').innerHTML=sorted.length===0?'<div class="empty">No eligible staff match these requirements.</div>':sorted.map((r,i)=>{
    const d=dst(r.City,sc),fl=POOL.has(r.Site.trim());
    return '<div class="cd"><div class="av '+av(r.Classification.trim())+'">'+ini(r.Name)+'</div><div class="ci"><div class="cn">'+r.Name+'</div><div class="cm">'+r.Role+' &middot; '+r.City+'</div><div class="bs">'+cb(r.Classification)+dBadge(d)+(fl?'<span class="b bfl">Floater</span>':'')+(r.Lock?'<span class="b bl">Lock</span>':'')+(r.Unlock?'<span class="b bu">Unlock</span>':'')+(r.Comments?'<span class="b bn">'+r.Comments+'</span>':'')+'</div><div class="cr">'+(r.PhoneTel?'<a href="tel:'+r.PhoneTel+'">'+r.PhoneDisplay+'</a>':'<span style="font-size:13px;color:var(--tx2)">'+(r.PhoneDisplay||'&#8212;')+'</span>')+'<span class="cs">&middot;</span><a href="mailto:'+r.Email+'">'+r.Email+'</a></div></div><div class="rk">#'+(i+1)+'</div></div>';
  }).join('');
}
