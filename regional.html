<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trident Regional Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ed;--bg2:#ede9e1;--bg3:#e5e0d5;
  --ink:#1a1814;--ink2:#4a4640;--ink3:#8a8478;
  --accent:#c4391a;--green:#2a7a4a;--yellow:#b87a10;--red:#c4391a;--blue:#1a4a8a;
  --br:rgba(26,24,20,.1);--fn:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:6px;
}
body{font-family:var(--fn);background:var(--bg);color:var(--ink);min-height:100vh}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-card{background:var(--ink);color:var(--bg);border-radius:12px;padding:2.5rem;max-width:400px;width:100%}
.login-logo{font-size:10px;font-family:var(--mono);letter-spacing:.15em;text-transform:uppercase;color:#8a8478;margin-bottom:1.5rem}
.login-title{font-size:26px;font-weight:700;margin-bottom:.4rem}
.login-sub{font-size:13px;color:#8a8478;margin-bottom:1.75rem}
.login-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:.75rem 1rem;font-size:16px;color:var(--bg);font-family:var(--mono);outline:none}
.login-input::placeholder{color:rgba(244,242,237,.25)}
.login-btn{width:100%;margin-top:.625rem;padding:.875rem;background:var(--accent);border:none;border-radius:var(--r);color:white;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fn)}
.login-err{margin-top:.625rem;font-size:12px;color:#ff8a7a;min-height:18px;text-align:center}
.app{display:none;min-height:100vh;flex-direction:column}
.app.show{display:flex}
.hdr{background:var(--ink);color:var(--bg);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-name{font-size:14px;font-weight:500}
.hdr-right{display:flex;align-items:center;gap:.75rem}
.hdr-date{font-size:11px;font-family:var(--mono);color:#8a8478}
.logout-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--bg);font-size:11px;padding:.3rem .625rem;border-radius:4px;cursor:pointer;font-family:var(--fn)}
.body{flex:1;padding:1rem}
.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:.625rem;margin-bottom:1rem}
@media(min-width:600px){.summary{grid-template-columns:repeat(4,1fr)}}
.sum-card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:.75rem 1rem}
.sum-val{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:2px}
.sum-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3)}
.sum-val.green{color:var(--green)}.sum-val.yellow{color:var(--yellow)}.sum-val.red{color:var(--red)}.sum-val.blue{color:var(--blue)}
.progress-label{font-size:11px;color:var(--ink3);font-family:var(--mono);margin-bottom:.375rem}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%}
.site-grid{display:flex;flex-direction:column;gap:.5rem}
.site-card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden}
.site-hdr{padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;cursor:pointer;user-select:none}
.site-hdr:hover{background:var(--bg3)}
.site-name{font-size:13px;font-weight:600}
.site-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.site-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.status-pill{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.pill-green{background:rgba(42,122,74,.12);color:var(--green)}
.pill-yellow{background:rgba(184,122,16,.12);color:var(--yellow)}
.pill-red{background:rgba(196,57,26,.12);color:var(--red)}
.pill-grey{background:rgba(26,24,20,.08);color:var(--ink3)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}.dot-yellow{background:var(--yellow)}.dot-red{background:var(--red)}.dot-grey{background:var(--ink3)}
.site-body{display:none;border-top:1px solid var(--br)}
.site-body.open{display:block}

/* STAFF TABLE */
.staff-table-wrap{overflow-x:auto}
.staff-table{width:100%;border-collapse:collapse;table-layout:fixed}
.staff-table th:nth-child(1),.staff-table td:nth-child(1){width:40%}
.staff-table th:nth-child(2),.staff-table td:nth-child(2){width:22%}
.staff-table th:nth-child(3),.staff-table td:nth-child(3){width:19%}
.staff-table th:nth-child(4),.staff-table td:nth-child(4){width:19%}
.staff-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);padding:.5rem 1rem;text-align:left;background:var(--bg3);border-bottom:1px solid var(--br)}
.staff-table td{font-size:12px;padding:.5rem 1rem;border-bottom:1px solid var(--br)}
.staff-table tr:last-child td{border-bottom:none}
.staff-table tr:hover td{background:var(--bg3)}
.punch-in{color:var(--green);font-family:var(--mono);font-size:11px}
.not-in{color:var(--yellow);font-size:11px}
.open-row td{color:var(--red)}

/* CALENDAR */
.cal-section{padding:.875rem 1rem;border-top:1px solid var(--br)}
.cal-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:.5rem}
.cal-days{display:grid;grid-template-columns:repeat(14,1fr);gap:3px}
@media(min-width:500px){.cal-days{grid-template-columns:repeat(28,1fr)}}
.cal-day{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:var(--mono);font-weight:500;cursor:default}
.cal-day.green{background:rgba(42,122,74,.15);color:var(--green)}
.cal-day.yellow{background:rgba(184,122,16,.15);color:var(--yellow)}
.cal-day.red{background:rgba(196,57,26,.15);color:var(--red)}
.cal-day.grey{background:rgba(26,24,20,.06);color:var(--ink3)}
.cal-day.today{outline:2px solid var(--ink);outline-offset:-2px}

.view-tabs{display:flex;gap:.5rem;margin-bottom:.875rem}
.vtab{padding:.4rem .875rem;font-size:12px;font-weight:500;border:1px solid var(--br);border-radius:4px;background:var(--bg2);color:var(--ink2);cursor:pointer;font-family:var(--fn)}
.vtab.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.cal-table{width:100%;border-collapse:collapse;font-size:11px}
.cal-table th{padding:.375rem .5rem;text-align:center;background:var(--bg3);border:1px solid var(--br);font-weight:600;white-space:nowrap}
.cal-table th.site-th{text-align:left;min-width:160px}
.cal-table td{padding:.375rem .5rem;border:1px solid var(--br);text-align:center;white-space:nowrap}
.cal-table td.site-td{text-align:left;font-weight:500;font-size:12px}
.cal-cell-green{background:rgba(42,122,74,.15);color:var(--green)}
.cal-cell-red{background:rgba(196,57,26,.15);color:var(--red)}
.cal-cell-grey{color:var(--ink3)}
.cal-cell-today{outline:2px solid var(--ink);outline-offset:-2px}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,24,20,.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:10px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-hdr{padding:1rem 1.25rem;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-size:14px;font-weight:600}
.modal-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink3);line-height:1;padding:0}
.modal-body{padding:1rem 1.25rem}
.modal-section{margin-bottom:1rem}
.modal-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:.5rem}
.candidate-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--br)}
.candidate-row:last-child{border:none}
.cand-av{width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--ink2);flex-shrink:0}
.cand-info{flex:1;min-width:0}
.cand-name{font-size:13px;font-weight:500}
.cand-detail{font-size:11px;color:var(--ink3);margin-top:1px}
.cand-phone{font-size:12px;font-family:var(--mono);color:var(--blue)}
.cand-phone a{color:var(--blue);text-decoration:none}
.modal-loading{text-align:center;padding:2rem;color:var(--ink3);font-size:13px}
.shift-badge{display:inline-block;font-size:11px;padding:3px 8px;background:rgba(196,57,26,.12);color:var(--red);border-radius:4px;font-weight:600;margin-bottom:.75rem}
.spinner{width:22px;height:22px;border:2px solid var(--br);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .75rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{text-align:center;padding:2rem;color:var(--ink3);font-size:13px}
</style>
</head>
<body>

<div class="login" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Trident Services · Regional Portal</div>
    <div class="login-title">Regional Dashboard</div>
    <div class="login-sub">Enter your Dayforce employee number</div>
    <input class="login-input" id="empInput" type="text" inputmode="numeric" placeholder="Employee number" maxlength="10">
    <button class="login-btn" onclick="login()">View Dashboard</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="app" id="appScreen">
  <header class="hdr">
    <div class="hdr-name" id="hdrName">—</div>
    <div class="hdr-right">
      <div class="hdr-date" id="hdrDate">—</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </header>
  <div class="body">
    <div class="summary">
      <div class="sum-card"><div class="sum-val green" id="sumGreen">—</div><div class="sum-label">Fully Staffed</div></div>
      <div class="sum-card"><div class="sum-val yellow" id="sumYellow">—</div><div class="sum-label">Partial</div></div>
      <div class="sum-card"><div class="sum-val red" id="sumRed">—</div><div class="sum-label">Understaffed</div></div>
      <div class="sum-card"><div class="sum-val blue" id="sumTotal">—</div><div class="sum-label">Sites</div></div>
    </div>
    <div class="view-tabs">
      <button class="vtab active" id="tabSites" onclick="setTab('sites')">Sites</button>
      <button class="vtab" id="tabCalendar" onclick="setTab('calendar')">Calendar</button>
    </div>
    <div class="progress-label" id="progressLabel" style="display:none"></div>
    <div class="progress-bar" id="progressBar" style="display:none"><div class="progress-fill" id="progressFill"></div></div>
    <div class="loading-state" id="loadingState"><div class="spinner"></div>Loading...</div>
    <div class="site-grid" id="siteGrid" style="display:flex;flex-direction:column;gap:.5rem"></div>
    <!-- CALENDAR VIEW -->
    <div id="calendarView" style="display:none">
      <div style="overflow-x:auto">
        <table class="cal-table" id="calTable"></table>
      </div>
    </div>
  </div>
</div>

<!-- UNFILLED SHIFT MODAL -->
<div class="modal-overlay" id="shiftModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="modalTitle">Unfilled Shift</div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="document.getElementById('shiftModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-loading">Loading candidates...</div>
    </div>
  </div>
</div>

<script>
const SERVER = 'https://shift-render.tridentservices.com.au';
const VALID = ['17626','17596','15056','17161','13739','12717','13880','13881'];
let manager = null, siteData = {}, empNames = {}, today = '';

document.getElementById('empInput').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

window.addEventListener('DOMContentLoaded', () => {
  const storedId = sessionStorage.getItem('regionalManagerId');
  if (storedId) { document.getElementById('empInput').value = storedId; login(); }
});

async function login() {
  const val = document.getElementById('empInput').value.trim();
  const err = document.getElementById('loginErr');
  err.textContent = '';
  if (!VALID.includes(val)) { err.textContent = 'Employee number not recognised.'; return; }
  err.textContent = 'Loading...';
  try {
    const r = await fetch(`${SERVER}/regional/manager?xref=${val}`);
    const data = await r.json();
    if (!r.ok || data.error) { err.textContent = data.error || 'Failed.'; return; }
    manager = data;
    sessionStorage.setItem('regionalManagerId', val);
    err.textContent = '';
    startApp();
  } catch(e) { err.textContent = 'Could not connect to server.'; }
}

function logout() {
  manager = null; siteData = {}; empNames = {};
  sessionStorage.removeItem('regionalManagerId');
  document.getElementById('appScreen').classList.remove('show');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('siteGrid').innerHTML = '';
  document.getElementById('empInput').value = '';
}

function getBrisDate(offset=0) {
  const d = new Date(new Date().toLocaleString('en-US', {timeZone:'Australia/Brisbane'}));
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('en-CA', {timeZone:'Australia/Brisbane'});
}

function fmtDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',timeZone:'Australia/Brisbane'});
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-AU',{timeZone:'Australia/Brisbane',hour:'2-digit',minute:'2-digit',hour12:false});
}

async function startApp() {
  today = getBrisDate();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('show');

  // Deduplicate sites
  const seen = new Set();
  manager.sites = manager.sites.filter(s => { if(seen.has(s.xrefCode)) return false; seen.add(s.xrefCode); return true; });

  document.getElementById('hdrName').textContent = manager.displayName + ' · ' + manager.sites.length + ' sites';
  document.getElementById('hdrDate').textContent = fmtDate(today);
  document.getElementById('sumTotal').textContent = manager.sites.length;
  document.getElementById('progressLabel').style.display = 'block';
  document.getElementById('progressBar').style.display = 'block';

  let loaded = 0;

  await Promise.all(manager.sites.map(async site => {
    try {
      const r = await fetch(`${SERVER}/regional/sitedata?site=${encodeURIComponent(site.xrefCode)}`);
      if (r.ok) siteData[site.xrefCode] = await r.json();
    } catch(e) { console.warn('Failed:', site.xrefCode); }
    loaded++;
    document.getElementById('progressFill').style.width = (loaded / manager.sites.length * 100) + '%';
    document.getElementById('progressLabel').textContent = `Loaded ${loaded} of ${manager.sites.length} sites...`;
    renderSites();
    updateSummary();
  }));

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('progressLabel').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';

  // Fetch employee names
  const allXrefs = new Set();
  Object.values(siteData).forEach(sd => (sd.assignedXrefs||[]).forEach(x => allXrefs.add(x)));
  if (allXrefs.size > 0) {
    try {
      const r = await fetch(`${SERVER}/regional/employees?xrefs=${[...allXrefs].join(',')}`);
      if (r.ok) { empNames = (await r.json()).employees || {}; renderSites(); }
    } catch(e) {}
  }
}

function getSiteStatus(xrefCode) {
  const sd = siteData[xrefCode];
  if (!sd) return 'grey';
  const assigned = (sd.assignedXrefs||[]).length;
  const open = sd.openShifts || 0;
  if (open > 0) return 'red';
  if (assigned === 0) return 'grey';

  // Only count staff whose shift has started by now
  const now = new Date();
  const shouldBeIn = (sd.assignedXrefs||[]).filter(xref => {
    const emp = sd.staffData?.[xref];
    if (!emp?.shiftStart) return true; // no time data, assume should be in
    return new Date(emp.shiftStart) <= now;
  });

  if (shouldBeIn.length === 0) return 'green'; // no one should be in yet
  const clockedIn = shouldBeIn.filter(xref => sd.staffData?.[xref]?.clockInTime).length;
  if (clockedIn < shouldBeIn.length) return 'yellow';
  return 'green';
}

function updateSummary() {
  let g=0,y=0,r=0;
  manager.sites.forEach(s => { const st=getSiteStatus(s.xrefCode); if(st==='green')g++; else if(st==='yellow')y++; else if(st==='red')r++; });
  document.getElementById('sumGreen').textContent=g;
  document.getElementById('sumYellow').textContent=y;
  document.getElementById('sumRed').textContent=r;
}

function renderSites() {
  const sorted = [...manager.sites].sort((a,b) => {
    const o={red:0,yellow:1,green:2,grey:3};
    return o[getSiteStatus(a.xrefCode)]-o[getSiteStatus(b.xrefCode)];
  });

  document.getElementById('siteGrid').innerHTML = sorted.map(site => {
    const sd = siteData[site.xrefCode];
    const status = getSiteStatus(site.xrefCode);
    const name = site.name;
    const assigned = (sd?.assignedXrefs||[]).length;
    const open = sd?.openShifts || 0;
    const clockedIn = Object.values(sd?.staffData||{}).filter(s => s.clockInTime).length;

    // Count who should be in right now
    const now = new Date();
    const shouldBeIn = (sd?.assignedXrefs||[]).filter(xref => {
      const emp = sd?.staffData?.[xref];
      if (!emp?.shiftStart) return true;
      return new Date(emp.shiftStart) <= now;
    });
    const clockedInNow = shouldBeIn.filter(xref => sd?.staffData?.[xref]?.clockInTime).length;

    const sub = sd
      ? `${assigned} rostered · ${clockedInNow}/${shouldBeIn.length} clocked in${open > 0 ? ' · ' + open + ' unfilled' : ''}`
      : 'Loading...';

    const pillCls = {green:'pill-green',yellow:'pill-yellow',red:'pill-red',grey:'pill-grey'}[status];
    const pillLbl = {green:'Staffed',yellow:'Partial',red:'Understaffed',grey:'No shifts'}[status];

    // Staff table rows
    let staffRows = '';
    if (sd) {
      // Assigned staff
      (sd.assignedXrefs||[]).forEach(xref => {
        const emp = sd.staffData?.[xref] || {};
        const name = empNames[xref]?.displayName || xref;
        const shiftTime = emp.shiftStart
          ? `${fmtTime(emp.shiftStart)} – ${fmtTime(emp.shiftEnd)}`
          : '—';
        const punchIn = emp.clockInTime
          ? `<span class="punch-in">✓ ${fmtTime(emp.clockInTime)}</span>`
          : `<span class="not-in">Not in</span>`;
        const punchOut = emp.clockOutTime
          ? `<span class="punch-in">✓ ${fmtTime(emp.clockOutTime)}</span>`
          : `<span class="not-in">—</span>`;
        staffRows += `<tr>
          <td>${name}</td>
          <td>${shiftTime}</td>
          <td>${punchIn}</td>
          <td>${punchOut}</td>
        </tr>`;
      });
      // Open/unfilled shifts
      for (let i = 0; i < (sd.openShifts||0); i++) {
        staffRows += `<tr class="open-row">
          <td>⚠ Unfilled shift</td>
          <td>—</td>
          <td>—</td>
          <td>—</td>
        </tr>`;
      }
    }

    const staffTable = staffRows ? `
      <div class="staff-table-wrap"><table class="staff-table">
        <thead><tr><th>Name</th><th>Shift</th><th>Clocked In</th><th>Clocked Out</th></tr></thead>
        <tbody>${staffRows}</tbody>
      </table>` : '<div style="padding:.875rem 1rem;font-size:12px;color:var(--ink3)">No shifts today</div>';

    // 28-day calendar
    const cal = sd?.calendar || {};
    const dots = Array.from({length:28},(_,i) => {
      const d = getBrisDate(i);
      const dd = cal[d];
      let cls = 'grey', title = fmtDate(d)+': no shifts';
      if (dd) {
        if (dd.open > 0) { cls='red'; title=`${fmtDate(d)}: ${dd.assigned} rostered, ${dd.open} unfilled`; }
        else if (dd.assigned > 0) { cls='green'; title=`${fmtDate(d)}: ${dd.assigned} rostered`; }
      }
      return `<div class="cal-day ${cls}${i===0?' today':''}" title="${title}">${parseInt(d.split('-')[2])}</div>`;
    }).join('');

    return `<div class="site-card">
      <div class="site-hdr" onclick="toggleSite('${site.xrefCode}')">
        <div><div class="site-name">${name}</div><div class="site-sub">${sub}</div></div>
        <div class="site-right">
          <div class="status-pill ${pillCls}">${pillLbl}</div>
          <div class="status-dot dot-${status==='grey'?'grey':status}"></div>
        </div>
      </div>
      <div class="site-body" id="sb-${site.xrefCode.replace(/\W/g,'_')}">
        ${staffTable}

      </div>
    </div>`;
  }).join('');
}

function setTab(tab) {
  document.getElementById('tabSites').classList.toggle('active', tab === 'sites');
  document.getElementById('tabCalendar').classList.toggle('active', tab === 'calendar');
  document.getElementById('siteGrid').style.display = tab === 'sites' ? 'flex' : 'none';
  document.getElementById('calendarView').style.display = tab === 'calendar' ? 'block' : 'none';
  if (tab === 'calendar') renderCalendar();
}

function renderCalendar() {
  if (!manager) return;
  const table = document.getElementById('calTable');
  if (!table) return;
  console.log('renderCalendar: sites=', manager.sites.length, 'siteData keys=', Object.keys(siteData).length);
  const dates = Array.from({length:28}, (_,i) => getBrisDate(i));

  // Header row
  const headCells = dates.map((d,i) => {
    const date = new Date(d+'T00:00:00');
    const day = date.toLocaleDateString('en-AU',{weekday:'narrow',timeZone:'Australia/Brisbane'});
    const num = parseInt(d.split('-')[2]);
    return `<th${i===0?' class="cal-cell-today"':''}>${day}<br>${num}</th>`;
  }).join('');
  
  const rows = manager.sites.map(site => {
    const sd = siteData[site.xrefCode];
    const name = site.name.replace(' - Security','').replace(' Security','').replace(' - Cleaning','').replace(' Cleaning','');
    const cells = dates.map((d,i) => {
      const cal = sd?.calendar?.[d];
      let cls = 'cal-cell-grey', text = '—';
      if (cal) {
        if (cal.open > 0) { cls = 'cal-cell-red'; text = cal.open + ' open'; }
        else if (cal.assigned > 0) { cls = 'cal-cell-green'; text = cal.assigned; }
      }
      const clickAttr = cal?.open > 0 ? `onclick="handleCalClick(this)" data-site="${site.xrefCode}" data-name="${name}" data-date="${d}" data-open='${JSON.stringify(cal.openShifts||[])}' style="cursor:pointer"` : '';
      return `<td class="${cls}${i===0?' cal-cell-today':''}" ${clickAttr}>${text}</td>`;
    }).join('');
    return `<tr><td class="site-td">${name}</td>${cells}</tr>`;
  }).join('');

  table.innerHTML = `
    <thead><tr><th class="site-th">Site</th>${headCells}</tr></thead>
    <tbody>${rows}</tbody>`;
}

function handleCalClick(el) {
  const site = el.dataset.site;
  const name = el.dataset.name;
  const date = el.dataset.date;
  const openShifts = JSON.parse(el.dataset.open || '[]');
  openUnfilledShift(site, name, date, openShifts);
}

function closeModal(e) {
  if (e.target === document.getElementById('shiftModal')) {
    document.getElementById('shiftModal').classList.remove('open');
  }
}

async function openUnfilledShift(site, siteName, date, openShifts) {
  const modal = document.getElementById('shiftModal');
  const title = document.getElementById('modalTitle');
  const sub = document.getElementById('modalSub');
  const body = document.getElementById('modalBody');

  title.textContent = siteName;
  sub.textContent = fmtDate(date) + ' · ' + openShifts.length + ' unfilled shift' + (openShifts.length !== 1 ? 's' : '');
  body.innerHTML = '<div class="modal-loading"><div class="spinner" style="margin:0 auto .5rem"></div>Loading candidates...</div>';
  modal.classList.add('open');

  try {
    const jobXRefCode = openShifts[0]?.jobXRefCode || '';
    const url = `${SERVER}/candidates?site=${encodeURIComponent(site)}&date=${encodeURIComponent(date)}${jobXRefCode ? '&jobXRefCode=' + encodeURIComponent(jobXRefCode) : ''}`;
    const r = await fetch(url);
    const data = await r.json();

    if (!r.ok || data.error) {
      body.innerHTML = `<div class="modal-loading">Failed to load candidates: ${data.error || 'Unknown error'}</div>`;
      return;
    }

    const candidates = data.candidates || [];

    // Show unfilled shifts
    const shiftsHtml = openShifts.map(s => `
      <div class="shift-badge">${s.jobXRefCode ? s.jobXRefCode.replace(/_/g,' ') : 'Unfilled shift'}</div>
    `).join('');

    // Show candidates
    const candsHtml = candidates.length === 0
      ? '<div style="font-size:13px;color:var(--ink3);padding:.5rem 0">No available candidates found</div>'
      : candidates.map(c => {
          const initials = (c.displayName||'?').split(' ').slice(0,2).map(p=>p[0]||'').join('').toUpperCase();
          const dist = c.distance ? c.distance.toFixed(1) + 'km away' : '';
          const phone = c.phone ? `<a href="tel:${c.phone}">${c.phone}</a>` : '—';
          return `<div class="candidate-row">
            <div class="cand-av">${initials}</div>
            <div class="cand-info">
              <div class="cand-name">${c.displayName}</div>
              <div class="cand-detail">${c.primaryJobName || ''} ${dist ? '· ' + dist : ''}</div>
            </div>
            <div class="cand-phone">${phone}</div>
          </div>`;
        }).join('');

    body.innerHTML = `
      <div class="modal-section">
        <div class="modal-section-title">Unfilled shifts</div>
        ${shiftsHtml}
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Available candidates (${candidates.length})</div>
        ${candsHtml}
      </div>`;

  } catch(e) {
    body.innerHTML = `<div class="modal-loading">Error: ${e.message}</div>`;
  }
}

function toggleSite(x) {
  const el = document.getElementById('sb-'+x.replace(/\W/g,'_'));
  if (el) el.classList.toggle('open');
}
</script>
</body>
</html>
